services:
  wake-on-http-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: wake-on-http-dev:latest
    container_name: wake-on-http-dev
    network_mode: host
    volumes:
      - /path/to/services:/wake-on-http/services:ro
      - /path/to/notifiers:/wake-on-http/notifiers:ro
      - /path/to/templates:/wake-on-http/templates:ro
    environment:
      - SERVER_PORT=5555
      - LOG_LEVEL=INFO
      - TZ=GMT
    restart: unless-stopped
